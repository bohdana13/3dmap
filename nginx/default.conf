server {
    listen 80;
    server_name virtual-pzks.chnu.edu.ua;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /panoramas/ {
        proxy_pass http://minio:9000/panoramas/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}