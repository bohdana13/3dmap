server {
    listen 80;
    server_name virtual-pzks.chnu.edu.ua;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name virtual-pzks.chnu.edu.ua;

    ssl_certificate /etc/letsencrypt/live/virtual-pzks.chnu.edu.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/virtual-pzks.chnu.edu.ua/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /panoramas/ {
        proxy_pass http://minio:9000/panoramas/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}